name: Build iOS App (Ad-Hoc Signed)

# 触发时机：每次 push / pull_request / 手动触发
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# 修复：softprops/action-gh-release 需要 contents: write 权限
# 默认 GITHUB_TOKEN 是 read-only，导致 403 "Resource not accessible"
permissions:
  contents: write

jobs:
  build-ios:
    name: Build .app + .ipa (Xcode 15.0, ad-hoc signed)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          sw_vers
          echo "---"
          ls -d /Applications/Xcode_*.app 2>/dev/null || echo "No Xcode_*.app found"
          echo "---"
          xcodebuild -version 2>/dev/null || true

      - name: Select Xcode 15.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Verify Xcode + SDK
        run: |
          xcodebuild -version
          echo "---"
          xcrun --show-sdk-path --sdk iphoneos
          xcrun --show-sdk-version --sdk iphoneos
          echo "---"
          # 关键：ad-hoc 签名要求 SDK >= iOS 18
          SDK_VER=$(xcrun --show-sdk-version --sdk iphoneos)
          echo "iOS SDK version: $SDK_VER"

      - name: Install XcodeGen
        run: brew install xcodegen

      # 关键修复：iOS 18 SDK 强制要求 AppIcon 实际 PNG 存在
      # 否则 actool 报 CompileAssetCatalog 错误
      # 用 Python 标准库生成 1024x1024 纯色 PNG（无外部依赖）
      - name: Generate AppIcon-1024.png
        run: |
          python3 << 'PYEOF'
          import struct, zlib, os
          W = H = 1024
          # 蓝色：#469fef (Micsig 主色调)
          R, G, B = 70, 159, 239
          # 用 zlib level 9 最大化压缩
          raw = b''
          for y in range(H):
              raw += b'\x00' + bytes([R, G, B] * W)
          comp = zlib.compress(raw, 9)

          def chunk(t, d):
              return struct.pack('>I', len(d)) + t + d + struct.pack('>I', zlib.crc32(t + d) & 0xffffffff)

          png = (b'\x89PNG\r\n\x1a\n' +
                 chunk(b'IHDR', struct.pack('>IIBBBBB', W, H, 8, 2, 0, 0, 0)) +
                 chunk(b'IDAT', comp) +
                 chunk(b'IEND', b''))

          out = 'RemotePlay/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png'
          os.makedirs(os.path.dirname(out), exist_ok=True)
          with open(out, 'wb') as f:
              f.write(png)
          print(f"Generated {out} ({len(png)} bytes)")
          PYEOF
          ls -la "RemotePlay/Resources/Assets.xcassets/AppIcon.appiconset/"

      - name: Generate .xcodeproj
        run: xcodegen generate

      - name: Verify .xcodeproj readable
        run: |
          xcodebuild -project RemotePlay.xcodeproj -list 2>&1

      # Xcode 16 默认 objectVersion 77（Xcode 16 兼容）
      # 不需要降级到 70，因为 macos-15 Runner 自带 Xcode 16.0+

      - name: Build for iOS device (unsigned, Xcode 15.0)
        run: |
          set -e -o pipefail
          # 回退到 v2.0.6 成功配置：macos-14 + Xcode 15.0 + build 模式
          # v2.1.3 改用 macos-15 + Xcode 16 + archive 模式后 CompileAssetCatalog 仍失败
          # macos-14 + Xcode 15.0 在 v2.0.6 实际能过 CompileAssetCatalog
          xcodebuild build \
            -project RemotePlay.xcodeproj \
            -scheme RemotePlay \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            build 2>&1 | tail -120
          echo "================================"
          echo "xcodebuild exit: $?"

      - name: Locate .app
        run: |
          set -e
          APP_DIR=$(find build -name "RemotePlay.app" -type d 2>/dev/null | head -n 1)
          if [ -z "$APP_DIR" ]; then
            echo "ERROR: RemotePlay.app not found"
            find build -name "*.app" -type d 2>/dev/null | head -5
            exit 1
          fi
          echo "Found app at: $APP_DIR"
          ls -la "$APP_DIR"

      - name: Verify built .app exists
        run: |
          APP_PATH=$(find build -name "RemotePlay.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: RemotePlay.app not found"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH"
          echo ""
          echo "--- Bundle binary ---"
          ls -la "$APP_PATH/RemotePlay"
          file "$APP_PATH/RemotePlay"
          echo ""
          echo "--- Info.plist key fields ---"
          PLIST="$APP_PATH/Info.plist"
          echo "CFBundleShortVersionString: $(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST" 2>/dev/null || echo MISSING)"
          echo "CFBundleVersion: $(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST" 2>/dev/null || echo MISSING)"
          echo "MinimumOSVersion: $(/usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$PLIST" 2>/dev/null || echo MISSING)"

      # v2.2.2: 移除 CI 端 ad-hoc 签名
      # 原因：CI 端 codesign --sign - 的 ad-hoc 签名会干扰 3uTools 的 Apple ID 二次签名
      # 导致 3uTools 报 "1 'apps' installation failed!"
      # 修复：让 CI 端只产未签名的 .app，由 3uTools 全权签名
      # 等价于 v2.0.6 成功的配置（Xcode 15.0 + build + CODE_SIGNING_ALLOWED=NO）

      # 关键：直接用 macOS 自带 zip 打 IPA
      # 不用 PowerShell / Windows Compress-Archive（它不写 unix file permissions）
      - name: Package .ipa with macOS zip (preserves unix permissions)
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          # 从 build 目录找签名后的 .app
          APP_DIR=$(find build -name "RemotePlay.app" -type d 2>/dev/null | head -n 1)
          if [ -z "$APP_DIR" ]; then
            echo "ERROR: RemotePlay.app not found"
            exit 1
          fi
          echo "App found: $APP_DIR"

          # 切到 .app 父目录
          APP_PARENT=$(dirname "$APP_DIR")
          cd "$APP_PARENT"
          echo "In directory: $(pwd)"
          ls -la

          # 确保主二进制有可执行权限
          chmod +x RemotePlay.app/RemotePlay
          # 给所有可执行文件加可执行权限（framework、dylib）
          find RemotePlay.app -type f -perm -u+x -exec chmod +x {} \;

          # 创建 IPA 标准结构
          rm -rf Payload
          mkdir Payload
          mv RemotePlay.app Payload/

          # 用 Apple 官方 ditto 工具打 IPA
          # 原因：macOS 内置 zip 命令写出的 .ipa 不是 100% 兼容 PKZIP 格式
          # 3uTools / AltStore / Sideloadly 可能拒绝（"incorrect file format"）
          # ditto 是 Apple Xcode 用的同一工具，输出 100% 兼容 IPA 标准
          # --sequesterRsrc: 把 macOS 资源分支分离到 __MACOSX/ 目录
          # --keepParent: 保留 Payload/ 父目录结构
          ditto -c -k --sequesterRsrc --keepParent Payload RemotePlay.ipa

          # 验证
          echo ""
          echo "--- IPA file ---"
          ls -la RemotePlay.ipa
          echo ""
          echo "--- IPA magic bytes (前 4 字节) ---"
          head -c 4 RemotePlay.ipa | xxd
          echo ""
          echo "--- IPA 内部结构 (前 30 行) ---"
          unzip -l RemotePlay.ipa | head -30
          echo ""
          echo "--- IPA 路径 ---"
          pwd

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: RemotePlay-ipa
          path: build/Build/Products/Release-iphoneos/RemotePlay.ipa
          if-no-files-found: error
          retention-days: 14

      # 同时把 .ipa 上传到 GitHub Release 页面（无 zip 包装）
      # 用户可以直接下载 .ipa 文件，不用解压
      - name: Upload .ipa to GitHub Release
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: build/Build/Products/Release-iphoneos/RemotePlay.ipa
          tag_name: ios-latest
          name: iOS Build ${{ github.sha }}
          body: |
            Direct .ipa download (no zip wrapper).

            Install with Sideloadly / 3uTools / AltStore:
            1. Download `RemotePlay.ipa` below
            2. Connect iPhone via USB
            3. In 3uTools: 工具箱 → IPA 签名 → select this file → Apple ID 签名
            4. 应用 → 安装 → select signed file
            5. iPhone: 设置 → 通用 → VPN 与设备管理 → 信任证书
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 自动更新 README 的 build 信息（仅 main 分支 + build-ios 成功后）
  update-readme:
    name: Update README build info
    needs: build-ios
    if: success() && github.ref == 'refs/heads/main'
    runs-on: macos-14
    timeout-minutes: 5
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          # 必须 fetch 历史才能 commit 回 main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract current version from CHANGELOG
        id: version
        run: |
          # 从 CHANGELOG.md 读第一行 ## v2.x.x 格式
          VERSION=$(grep -m1 '^## v' CHANGELOG.md | sed 's/^## v//' | sed 's/ .*//' | sed 's/-.*//')
          if [ -z "$VERSION" ]; then
            # 回退：从 git tag 读
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')
          fi
          if [ -z "$VERSION" ]; then
            VERSION="0.0.0"
          fi
          echo "VERSION=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Extracted version: v${VERSION}"

      - name: Run update_readme.sh
        run: |
          chmod +x scripts/update_readme.sh
          ./scripts/update_readme.sh \
            "${{ steps.version.outputs.VERSION }}" \
            "$(git rev-parse --short HEAD)" \
            "passing"

      - name: Show README diff
        run: |
          echo "=== README.md changes ==="
          git diff --stat README.md
          echo "=== Full diff ==="
          git diff README.md

      - name: Auto-commit README update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update README [skip ci]"
          file_pattern: README.md
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

  build-simulator:
    name: Build for iOS Simulator (smoke test)
    runs-on: macos-14
    timeout-minutes: 25
    needs: build-ios

    strategy:
      matrix:
        destination:
          - 'platform=iOS Simulator,name=iPhone 14,OS=16.0'
          - 'platform=iOS Simulator,name=iPhone 15,OS=17.0'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Select Xcode 15.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate .xcodeproj
        run: xcodegen generate

      - name: Build for simulator
        run: |
          set -e -o pipefail
          xcodebuild \
            -project RemotePlay.xcodeproj \
            -scheme RemotePlay \
            -configuration Debug \
            -destination "${{ matrix.destination }}" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            build 2>&1 | tail -80

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-build-log
          path: build/Logs/Build/*.log
          retention-days: 3
