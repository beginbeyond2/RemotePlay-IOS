name: Build iOS App (Unsigned)

# 触发时机：每次 push / pull_request / 手动触发
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build .app for iOS 16 / iOS 17
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Select Xcode 15.4 (iOS 17 SDK)
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate .xcodeproj
        run: xcodegen generate

      - name: Build for iOS device (unsigned)
        run: |
          xcodebuild \
            -project RemotePlay.xcodeproj \
            -scheme RemotePlay \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: List build output
        run: |
          echo "--- Build products ---"
          find build/Build/Products -maxdepth 4 -type d -name "*.app" 2>/dev/null
          echo "--- Info.plist key values ---"
          PLIST=$(find build/Build/Products -name "Info.plist" -path "*Release-iphoneos*" | head -n 1)
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$PLIST" || true

      - name: Package .app as zip
        run: |
          APP_PATH=$(find build/Build/Products -maxdepth 4 -type d -name "RemotePlay.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: RemotePlay.app not found"
            exit 1
          fi
          echo "App path: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r RemotePlay-unsigned.zip RemotePlay.app

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: RemotePlay-unsigned
          path: build/Build/Products/Release-iphoneos/RemotePlay-unsigned.zip
          if-no-files-found: error
          retention-days: 14

  build-simulator:
    name: Build for iOS Simulator (smoke test)
    runs-on: macos-14
    timeout-minutes: 25
    needs: build-ios

    strategy:
      matrix:
        destination:
          - 'platform=iOS Simulator,name=iPhone 15,OS=17.0'
          - 'platform=iOS Simulator,name=iPhone 14,OS=16.0'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate .xcodeproj
        run: xcodegen generate

      - name: Build for simulator
        run: |
          xcodebuild \
            -project RemotePlay.xcodeproj \
            -scheme RemotePlay \
            -configuration Debug \
            -destination "${{ matrix.destination }}" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-build-log-${{ matrix.destination }}
          path: build/Logs/Build/*.log
          retention-days: 3
