name: Build iOS App (Ad-Hoc Signed)

# 触发时机：每次 push / pull_request / 手动触发
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build .app + .ipa (Xcode 16, ad-hoc signed)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          sw_vers
          echo "---"
          ls -d /Applications/Xcode_*.app 2>/dev/null || echo "No Xcode_*.app found"
          echo "---"
          xcodebuild -version 2>/dev/null || true

      - name: Select Xcode 16.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Verify Xcode + SDK
        run: |
          xcodebuild -version
          echo "---"
          xcrun --show-sdk-path --sdk iphoneos
          xcrun --show-sdk-version --sdk iphoneos
          echo "---"
          # 关键：ad-hoc 签名要求 SDK >= iOS 18
          SDK_VER=$(xcrun --show-sdk-version --sdk iphoneos)
          echo "iOS SDK version: $SDK_VER"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate .xcodeproj
        run: xcodegen generate

      - name: Verify .xcodeproj readable
        run: |
          xcodebuild -project RemotePlay.xcodeproj -list 2>&1

      # Xcode 16 默认 objectVersion 77（Xcode 16 兼容）
      # 不需要降级到 70，因为 macos-15 Runner 自带 Xcode 16.0+

      - name: Build for iOS device (ad-hoc signed)
        run: |
          set -e -o pipefail
          # ad-hoc 签名（self-signed）让 .app 包含必需的 _CodeSignature/CodeResources
          # 避免 iOS 26.5 mountypuppet 报 "Can't listdir a file"
          # Sideloadly/AltStore/3uTools 会用自己的 Apple ID 证书重新签
          xcodebuild \
            -project RemotePlay.xcodeproj \
            -scheme RemotePlay \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            build 2>&1 | tail -120
          echo "================================"
          echo "xcodebuild exit: $?"

      - name: Verify built .app exists + signed
        run: |
          APP_PATH=$(find build -name "RemotePlay.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: RemotePlay.app not found"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH"
          echo ""
          echo "--- _CodeSignature/ contents ---"
          ls -la "$APP_PATH/_CodeSignature/" 2>&1
          echo ""
          echo "--- Bundle binary ---"
          ls -la "$APP_PATH/RemotePlay"
          file "$APP_PATH/RemotePlay"
          echo ""
          echo "--- Info.plist key fields ---"
          PLIST="$APP_PATH/Info.plist"
          echo "CFBundleShortVersionString: $(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST" 2>/dev/null || echo MISSING)"
          echo "CFBundleVersion: $(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST" 2>/dev/null || echo MISSING)"
          echo "MinimumOSVersion: $(/usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$PLIST" 2>/dev/null || echo MISSING)"

      # 关键：直接用 macOS 自带 zip 打 IPA
      # 不用 PowerShell / Windows Compress-Archive（它不写 unix file permissions）
      - name: Package .ipa with macOS zip (preserves unix permissions)
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          APP_DIR=$(find build -name "RemotePlay.app" -type d | head -n 1)
          if [ -z "$APP_DIR" ]; then
            echo "ERROR: RemotePlay.app not found under build/"
            find build -name "*.app" -type d | head -20
            exit 1
          fi
          echo "App found: $APP_DIR"

          # 切到 .app 父目录
          APP_PARENT=$(dirname "$APP_DIR")
          cd "$APP_PARENT"
          echo "In directory: $(pwd)"
          ls -la

          # 确保主二进制有可执行权限
          chmod +x RemotePlay.app/RemotePlay
          # 给所有可执行文件加可执行权限（framework、dylib）
          find RemotePlay.app -type f -perm -u+x -exec chmod +x {} \;

          # 创建 IPA 标准结构
          rm -rf Payload
          mkdir Payload
          mv RemotePlay.app Payload/

          # 用 macOS 自带的 zip（不是 PowerShell 的 Compress-Archive）
          # -y 保留 unix 文件信息（symlink）
          # 不带压缩最大化兼容性
          zip -r -y RemotePlay.ipa Payload/ > /dev/null

          # 验证
          echo ""
          echo "--- IPA file ---"
          ls -la RemotePlay.ipa
          echo ""
          echo "--- IPA 内部结构 (前 30 行) ---"
          unzip -l RemotePlay.ipa | head -30
          echo ""
          echo "--- IPA 中 RemotePlay 主二进制权限 ---"
          unzip -Z RemotePlay.ipa Payload/RemotePlay.app/RemotePlay 2>&1 | head -5
          echo ""
          echo "--- IPA 路径 ---"
          pwd

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: RemotePlay-ipa
          path: build/Build/Products/Release-iphoneos/RemotePlay.ipa
          if-no-files-found: error
          retention-days: 14

  build-simulator:
    name: Build for iOS Simulator (smoke test)
    runs-on: macos-15
    timeout-minutes: 25
    needs: build-ios

    strategy:
      matrix:
        destination:
          - 'platform=iOS Simulator,name=iPhone 16,OS=18.0'
          - 'platform=iOS Simulator,name=iPhone 15,OS=17.0'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Select Xcode 16.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate .xcodeproj
        run: xcodegen generate

      - name: Build for simulator
        run: |
          set -e -o pipefail
          xcodebuild \
            -project RemotePlay.xcodeproj \
            -scheme RemotePlay \
            -configuration Debug \
            -destination "${{ matrix.destination }}" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            build 2>&1 | tail -80

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-build-log
          path: build/Logs/Build/*.log
          retention-days: 3
