name: Build iOS App (Unsigned)

# 触发时机：每次 push / pull_request / 手动触发
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build .app + .ipa for iOS 16 / iOS 17
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          sw_vers
          echo "---"
          ls -d /Applications/Xcode_*.app 2>/dev/null || echo "No Xcode_*.app found"
          echo "---"
          xcodebuild -version 2>/dev/null || true

      - name: Select Xcode 15.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Verify Xcode
        run: |
          xcodebuild -version
          xcrun --show-sdk-path --sdk iphonesimulator
          xcrun --show-sdk-path --sdk iphoneos

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate .xcodeproj
        run: xcodegen generate

      - name: Downgrade project.pbxproj objectVersion to 70 (Xcode 15.0+)
        run: |
          PBXPROJ="RemotePlay.xcodeproj/project.pbxproj"
          if [ ! -f "$PBXPROJ" ]; then
            echo "ERROR: $PBXPROJ not found"
            exit 1
          fi
          echo "--- Before ---"
          grep "objectVersion" "$PBXPROJ" || echo "(no objectVersion found)"
          sed -i.bak 's/objectVersion = 77;/objectVersion = 70;/g' "$PBXPROJ"
          rm -f "${PBXPROJ}.bak"
          echo "--- After ---"
          grep "objectVersion" "$PBXPROJ" || echo "(no objectVersion found)"

      - name: Verify project can be read
        run: |
          xcodebuild -project RemotePlay.xcodeproj -list 2>&1

      - name: Build for iOS device (unsigned)
        run: |
          set -e -o pipefail
          xcodebuild \
            -project RemotePlay.xcodeproj \
            -scheme RemotePlay \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            build 2>&1 | tail -120
          echo "================================"
          echo "xcodebuild exit: $?"

      - name: Verify built .app exists
        run: |
          APP_PATH=$(find build -name "RemotePlay.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: RemotePlay.app not found"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH"
          # Show bundle binary permissions (关键！macOS zip 会保留这些)
          ls -la "$APP_PATH/RemotePlay"
          file "$APP_PATH/RemotePlay"
          PLIST="$APP_PATH/Info.plist"
          echo "CFBundleShortVersionString: $(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST" 2>/dev/null || echo MISSING)"
          echo "CFBundleVersion: $(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST" 2>/dev/null || echo MISSING)"
          echo "MinimumOSVersion: $(/usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$PLIST" 2>/dev/null || echo MISSING)"

      # 关键修复：直接用 macOS 自带 zip 打 IPA
      # 不用 PowerShell / Windows Compress-Archive（它不写 unix file permissions）
      - name: Package .ipa with macOS zip (preserves unix permissions)
        run: |
          set -e
          APP_DIR=$(find build -name "RemotePlay.app" -type d | head -n 1)
          if [ -z "$APP_DIR" ]; then
            echo "ERROR: RemotePlay.app not found"
            exit 1
          fi
          PARENT=$(dirname "$APP_DIR")
          cd "$PARENT"

          # 确保主二进制有可执行权限
          chmod +x RemotePlay.app/RemotePlay 2>/dev/null || true
          # 给所有嵌套 framework 可执行权限
          find RemotePlay.app -type f -perm -u+x -exec chmod +x {} \; 2>/dev/null || true

          # 创建 IPA 标准结构
          rm -rf Payload
          mkdir Payload
          mv RemotePlay.app Payload/

          # 用 macOS 自带的 zip（不是 PowerShell 的 Compress-Archive）
          # -y 保留 unix 文件信息（symlink）
          # 不带压缩最大化兼容性
          zip -r -y ../RemotePlay.ipa Payload/ > /dev/null

          # 回到 build 目录
          cd ..
          cd "$PARENT/.." || cd ..

          # 上传后清理 Payload 临时目录（不影响 .app）
          rm -rf "$PARENT/Payload"

          # 验证
          echo "--- IPA file ---"
          ls -la RemotePlay.ipa
          echo "--- IPA 内部结构 ---"
          unzip -l RemotePlay.ipa | head -30
          echo "--- IPA 中 RemotePlay 二进制权限 ---"
          unzip -p RemotePlay.ipa Payload/RemotePlay.app/RemotePlay | head -c 4 | xxd

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: RemotePlay-ipa
          path: build/Build/Products/Release-iphoneos/RemotePlay.ipa
          if-no-files-found: error
          retention-days: 14

  build-simulator:
    name: Build for iOS Simulator (smoke test)
    runs-on: macos-14
    timeout-minutes: 25
    needs: build-ios

    strategy:
      matrix:
        destination:
          - 'platform=iOS Simulator,name=iPhone 15,OS=17.0'
          - 'platform=iOS Simulator,name=iPhone 14,OS=16.0'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Select Xcode 15.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate .xcodeproj
        run: xcodegen generate

      - name: Downgrade project.pbxproj objectVersion to 70
        run: |
          PBXPROJ="RemotePlay.xcodeproj/project.pbxproj"
          sed -i.bak 's/objectVersion = 77;/objectVersion = 70;/g' "$PBXPROJ"
          rm -f "${PBXPROJ}.bak"

      - name: Build for simulator
        run: |
          set -e -o pipefail
          xcodebuild \
            -project RemotePlay.xcodeproj \
            -scheme RemotePlay \
            -configuration Debug \
            -destination "${{ matrix.destination }}" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            build 2>&1 | tail -80

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-build-log
          path: build/Logs/Build/*.log
          retention-days: 3
