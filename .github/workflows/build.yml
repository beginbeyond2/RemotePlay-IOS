name: Build iOS App (Unsigned)

# 触发时机：每次 push / pull_request / 手动触发
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build .app for iOS 16 / iOS 17
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          sw_vers
          echo "---"
          ls -d /Applications/Xcode_*.app 2>/dev/null || echo "No Xcode_*.app found"
          echo "---"
          xcodebuild -version 2>/dev/null || true

      - name: Select Xcode 15.0 (most broadly available on macos-14)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Verify Xcode
        run: |
          xcodebuild -version
          xcrun --show-sdk-path --sdk iphonesimulator
          xcrun --show-sdk-path --sdk iphoneos

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate .xcodeproj
        run: xcodegen generate

      # 关键修复：xcodegen 默认输出 objectVersion=77（Xcode 15.4 格式），
      # 但 Runner 上的 Xcode 15.0~15.2 只支持 70。手动降级。
      - name: Downgrade project.pbxproj objectVersion to 70 (Xcode 15.0+)
        run: |
          PBXPROJ="RemotePlay.xcodeproj/project.pbxproj"
          if [ ! -f "$PBXPROJ" ]; then
            echo "ERROR: $PBXPROJ not found"
            exit 1
          fi
          echo "--- Before ---"
          grep "objectVersion" "$PBXPROJ" || echo "(no objectVersion found)"
          # 77 -> 70 (Xcode 15.0+ 兼容)
          sed -i.bak 's/objectVersion = 77;/objectVersion = 70;/g' "$PBXPROJ"
          rm -f "${PBXPROJ}.bak"
          echo "--- After ---"
          grep "objectVersion" "$PBXPROJ" || echo "(no objectVersion found)"

      - name: Verify project can be read
        run: |
          xcodebuild -project RemotePlay.xcodeproj -list 2>&1

      - name: Build for iOS device (unsigned)
        run: |
          set -e -o pipefail
          xcodebuild \
            -project RemotePlay.xcodeproj \
            -scheme RemotePlay \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            build 2>&1 | tail -120
          echo "================================"
          echo "xcodebuild exit: $?"

      - name: List build output
        run: |
          echo "--- Looking for built .app ---"
          find build -name "*.app" -type d 2>/dev/null
          echo "---"
          APP_PATH=$(find build -name "RemotePlay.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: RemotePlay.app not found, build may have failed"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH"
          PLIST="$APP_PATH/Info.plist"
          echo "CFBundleShortVersionString: $(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST" 2>/dev/null || echo MISSING)"
          echo "CFBundleVersion: $(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST" 2>/dev/null || echo MISSING)"
          echo "MinimumOSVersion: $(/usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$PLIST" 2>/dev/null || echo MISSING)"

      - name: Package .app as zip
        run: |
          APP_DIR=$(find build -name "RemotePlay.app" -type d | head -n 1)
          if [ -z "$APP_DIR" ]; then
            echo "ERROR: RemotePlay.app not found"
            exit 1
          fi
          PARENT=$(dirname "$APP_DIR")
          APP_NAME=$(basename "$APP_DIR")
          cd "$PARENT"
          zip -r RemotePlay-unsigned.zip "$APP_NAME"

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: RemotePlay-unsigned
          path: build/Build/Products/Release-iphoneos/RemotePlay-unsigned.zip
          if-no-files-found: error
          retention-days: 14

  build-simulator:
    name: Build for iOS Simulator (smoke test)
    runs-on: macos-14
    timeout-minutes: 25
    needs: build-ios

    strategy:
      matrix:
        destination:
          - 'platform=iOS Simulator,name=iPhone 15,OS=17.0'
          - 'platform=iOS Simulator,name=iPhone 14,OS=16.0'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Select Xcode 15.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate .xcodeproj
        run: xcodegen generate

      - name: Downgrade project.pbxproj objectVersion to 70
        run: |
          PBXPROJ="RemotePlay.xcodeproj/project.pbxproj"
          sed -i.bak 's/objectVersion = 77;/objectVersion = 70;/g' "$PBXPROJ"
          rm -f "${PBXPROJ}.bak"
          grep "objectVersion" "$PBXPROJ" || true

      - name: Build for simulator
        run: |
          set -e -o pipefail
          xcodebuild \
            -project RemotePlay.xcodeproj \
            -scheme RemotePlay \
            -configuration Debug \
            -destination "${{ matrix.destination }}" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            build 2>&1 | tail -80

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-build-log
          path: build/Logs/Build/*.log
          retention-days: 3
